```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GRUPO MBP | METALÚRGICA</title>

<style>
body{
    background:#0f172a;

    font-family:Arial;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;

}

label{
    font-size:11px;
    color:#94a3b8;
    display:block;
    margin-bottom:4px;

    width:100%;

    border:1px solid #334155;
    background:#0f172a;

    box-sizing:border-box;
}

.grid{
    display:grid;
    grid-template-columns:1fr 2fr 120px 1fr 1fr;

.grid2{
    display:grid;
    grid-template-columns:2fr 1fr 1fr;
    gap:12px;
    margin-top:12px;
}

.grid3{
    display:grid;
    grid-template-columns:1fr 2fr;

}

button{
    width:100%;

    color:#94a3b8;

    padding:8px;

    font-size:14px;
}
</style>
</head>

<body>

<h3>GRUPO MBP | METALÚRGICA</h3>
<p style="color:#94a3b8;font-size:12px">
Conectado como: <b>Setor de Compras</b>
</p>

<div class="card">

    <div class="grid">

        <div>
            <label>DATA</label>
            <input type="date" id="data">
        </div>

        <div>
            <label>FORNECEDOR</label>
            <input id="fornecedor" placeholder="Nome do fornecedor">
        </div>

        <div>
            <label>VALOR INICIAL R$</label>
            <input type="number" id="valor_inicial" oninput="calc()">
        </div>

        <div>
            <label>DESCONTO R$</label>
            <input type="number" id="desconto" oninput="calc()">
        </div>

        <div>
            <label>TOTAL FINAL R$</label>
            <input type="number"
                   id="valor_final"
                   readonly
                   style="background:#16a34a">
        </div>

    </div>


    <div class="grid2">

        <div>
            <label>DESCRIÇÃO DO MATERIAL</label>
            <input id="descricao">
        </div>

        <div>
            <label>CENTRO DE CUSTO</label>

            <select id="centro">
                <option value="1410|MBP RJ">
                    1410 - MBP RJ
                </option>

                <option value="1000|MBP SP">
                    1000 - MBP SP
                </option>

                <option value="1200|MBP PE">
                    1200 - MBP PE
                </option>
            </select>
        </div>

        <div>
            <label>COMPRADOR</label>

            <select id="comprador">
                <option>Michelle</option>
                <option>Carlos</option>
                <option>João</option>
                <option>Fernanda</option>
            </select>

        </div>

    </div>


    <div class="grid3">

        <div>
            <label>Nº DOCUMENTO</label>
            <input id="documento"
                   placeholder="NF, Pedido, Contrato">
        </div>

        <div>
            <label>OBSERVAÇÃO</label>
            <input id="obs"
                   placeholder="Informações adicionais">
        </div>

    </div>


    <button onclick="salvar()">
        Salvar Compra
    </button>

</div>


<table>

<thead>

<tr>
    <th>Data</th>
    <th>Fornecedor</th>
    <th>Centro</th>
    <th>Material</th>
    <th>Comprador</th>
    <th>Documento</th>
    <th>Total Final</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>



<script>

function calc(){

    let ini =
    parseFloat(
        document.getElementById('valor_inicial').value
    ) || 0;

    let desc =
    parseFloat(
        document.getElementById('desconto').value
    ) || 0;

    document.getElementById(
        'valor_final'
    ).value = (ini - desc).toFixed(2);

}



async function salvar(){

    const centro =
    document.getElementById("centro")
    .value.split("|");


    const payload = {

        data:
        document.getElementById('data').value,

        fornecedor:
        document.getElementById('fornecedor').value,

        descricao_material:
        document.getElementById('descricao').value,

        valor_inicial:
        parseFloat(
            document.getElementById(
                'valor_inicial'
            ).value
        ) || 0,

        desconto:
        parseFloat(
            document.getElementById(
                'desconto'
            ).value
        ) || 0,

        valor_final:
        parseFloat(
            document.getElementById(
                'valor_final'
            ).value
        ) || 0,

        centro_custo_codigo:
        centro[0],

        centro_custo_nome:
        centro[1],

        comprador:
        document.getElementById(
            'comprador'
        ).value,

        documento:
        document.getElementById(
            'documento'
        ).value,

        observacao:
        document.getElementById(
            'obs'
        ).value

    };


    if(
        !payload.data ||
        !payload.fornecedor ||
        !payload.descricao_material
    ){

        alert(
            "Preencha Data, Fornecedor e Descrição."
        );

        return;

    }


    let r = await fetch(
        "/compras",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(payload)
        }
    );


    if(!r.ok){

        let e = await r.text();

        alert(e);

        return;

    }


    alert("Compra cadastrada com sucesso!");


    document.getElementById(
        "fornecedor"
    ).value = "";

    document.getElementById(
        "descricao"
    ).value = "";

    document.getElementById(
        "valor_inicial"
    ).value = "";

    document.getElementById(
        "desconto"
    ).value = "";

    document.getElementById(
        "valor_final"
    ).value = "";

    document.getElementById(
        "documento"
    ).value = "";

    document.getElementById(
        "obs"
    ).value = "";


    load();

}



async function load(){

    let r = await fetch("/compras");

    let d = await r.json();


    document.getElementById(
        "tbody"
    ).innerHTML = d.map(c => `

    <tr>

        <td>${c.data || ''}</td>

        <td>${c.fornecedor || ''}</td>

        <td>${c.centro_custo_codigo || ''}</td>

        <td>${c.descricao_material || ''}</td>

        <td>${c.comprador || ''}</td>

        <td>${c.documento || ''}</td>

        <td>R$ ${c.valor_final || 0}</td>

    </tr>

    `).join("");

}


load();

document.getElementById(
    "data"
).valueAsDate = new Date();


</script>

</body>
</html>
