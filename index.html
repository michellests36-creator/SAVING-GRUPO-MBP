<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GRUPO MBP | METALÚRGICA</title>
<style>
body{background:#0f172a;color:#fff;font-family:Arial;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:12px;margin-bottom:20px}
label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px}
input,select{width:100%;padding:10px;border-radius:8px;border:1px solid #334155;background:#0f172a;color:#fff;box-sizing:border-box}
.grid{display:grid;grid-template-columns:1fr 2fr 120px 1fr 1fr;gap:12px}
.grid2{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;margin-top:12px}
button{width:100%;padding:14px;background:#16a34a;border:0;border-radius:10px;color:#fff;font-weight:bold;margin-top:16px;cursor:pointer}
table{width:100%;border-collapse:collapse;margin-top:10px}
th{color:#94a3b8;font-size:12px;text-align:left;padding:8px}
td{padding:8px;border-top:1px solid #1e293b;font-size:14px}
</style>
</head>
<body>
<h3>GRUPO MBP | METALÚRGICA</h3>
<p style="color:#94a3b8;font-size:12px">Conectado como: <b>compras</b></p>

<div class="card">
  <div class="grid">
    <div><label>DATA</label><input type="date" id="data"></div>
    <div><label>FORNECEDOR</label><input id="fornecedor" placeholder="Nome do fornecedor"></div>
    <div><label>VALOR INICIAL R$</label><input type="number" id="valor_inicial" oninput="calc()"></div>
    <div><label>DESCONTO R$</label><input type="number" id="desconto" oninput="calc()"></div>
    <div><label>TOTAL FINAL R$</label><input type="number" id="valor_final" readonly style="background:#16a34a"></div>
  </div>

  <div class="grid2">
    <div><label>DESCRIÇÃO DO MATERIAL</label><input id="descricao"></div>
    <div><label>CÓDIGO CENTRO</label><input id="centro_codigo" value="1410"></div>
    <div><label>CENTRO DE CUSTO</label><select id="centro_nome"><option>1410 - MBP RJ</option><option>1000 - MBP SP</option></select></div>
    <div><label>NOME DO COMPRADOR</label><select id="comprador"><option>Michelle</option><option>Carlos</option><option>Outro</option></select></div>
  </div>

  <div style="margin-top:12px"><label>OBSERVAÇÃO / DOCUMENTO</label><input id="obs" placeholder="Nº NF, observações"></div>
  <button onclick="salvar()">Salvar Compra</button>
</div>

<table>
<thead><tr><th>Data</th><th>Fornecedor</th><th>Centro</th><th>Descrição</th><th>Comprador</th><th>Total Final</th></tr></thead>
<tbody id="tbody"></tbody>
</table>

<script>
function calc(){
  let ini = parseFloat(document.getElementById('valor_inicial').value)||0
  let desc = parseFloat(document.getElementById('desconto').value)||0
  document.getElementById('valor_final').value = (ini - desc).toFixed(2)
}
async function salvar(){
  const payload = {
    data: document.getElementById('data').value,
    fornecedor: document.getElementById('fornecedor').value,
    descricao_material: document.getElementById('descricao').value,
    valor_inicial: parseFloat(document.getElementById('valor_inicial').value)||0,
    desconto: parseFloat(document.getElementById('desconto').value)||0,
    valor_final: parseFloat(document.getElementById('valor_final').value)||0,
    centro_custo_codigo: document.getElementById('centro_codigo').value,
    centro_custo_nome: document.getElementById('centro_nome').value,
    comprador: document.getElementById('comprador').value,
    observacao: document.getElementById('obs').value,
    documento: document.getElementById('obs').value
  }
  if(!payload.data || !payload.fornecedor || !payload.descricao_material){ alert('Preencha Data, Fornecedor e Descrição'); return }
  let r = await fetch('/compras',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
  if(!r.ok){ let e=await r.text(); alert(e); return }
  alert('Salvo!'); load()
}
async function load(){
  let r = await fetch('/compras'); let d = await r.json()
  document.getElementById('tbody').innerHTML = d.map(c=>`<tr><td>${c.data||''}</td><td>${c.fornecedor||''}</td><td>${c.centro_custo_codigo||''}</td><td>${c.descricao_material||c.observacao||''}</td><td>${c.comprador||''}</td><td>R$ ${c.valor_final||c.valor||0}</td></tr>`).join('')
}
load()
document.getElementById('data').valueAsDate = new Date()
</script>
</body>
</html>
